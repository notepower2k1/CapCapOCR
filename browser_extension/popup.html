<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CapCapOCR Test</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>CapCapOCR Test</h1>

      <label class="field">
        <span>OCR Endpoint</span>
        <input id="apiUrl" type="text" value="http://127.0.0.1:8000/api/ocr/base64" />
      </label>

      <label class="field">
        <span>Phase 2 Endpoint</span>
        <input id="phase2Url" type="text" value="http://127.0.0.1:8000/api/phase2" />
      </label>

      <div class="row">
        <label class="field">
          <span>Source</span>
          <select id="sourceLang">
            <option value="ja" selected>Japanese</option>
            <option value="auto">Auto</option>
          </select>
        </label>

        <label class="field">
          <span>OCR Engine</span>
          <select id="ocrEngine">
            <option value="gguf" selected>GGUF Manga</option>
            <option value="hybrid">manga-ocr Hybrid</option>
            <option value="paddle">Paddle Only</option>
            <option value="auto">Auto</option>
          </select>
        </label>
      </div>

      <div class="row">
        <label class="field">
          <span>Detection</span>
          <select id="detectionEngine">
            <option value="text" selected>Paddle Text</option>
            <option value="bubble">YOLO Bubble</option>
          </select>
        </label>

        <label class="field">
          <span>Target</span>
          <select id="targetLang">
            <option value="en" selected>English</option>
            <option value="vi">Vietnamese</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
        </label>
      </div>

      <div class="row">
        <label class="field">
          <span>Translator</span>
          <select id="translatorEngine">
            <option value="local" selected>Local Gemma</option>
            <option value="api">Gemini API</option>
            <option value="auto">Auto</option>
          </select>
        </label>

        <div class="field"></div>
      </div>

      <div class="actions">
        <button id="runButton" type="button">Capture, Translate, Overlay</button>
        <button id="clearButton" type="button" class="secondary">Clear Overlay</button>
      </div>

      <div class="row">
        <label class="field">
          <span>Page Image</span>
          <select id="imageCandidate"></select>
        </label>

        <label class="field">
          <span>&nbsp;</span>
          <button id="refreshImagesButton" type="button" class="secondary">Refresh Images</button>
        </label>
      </div>

      <p id="status" class="status idle">Ready.</p>

      <label class="field">
        <span>Joined Text</span>
        <textarea id="joinedText" rows="8" readonly></textarea>
      </label>

      <label class="field">
        <span>Overlay Text</span>
        <textarea id="overlayText" rows="8" readonly></textarea>
      </label>

      <label class="field">
        <span>Raw JSON</span>
        <textarea id="rawJson" rows="12" readonly></textarea>
      </label>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
